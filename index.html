<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>vizfuzz</title>
  <style>* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0b0e;
  overflow: hidden;
  font: 13px/1.4 system-ui, sans-serif;
  color: #ccc;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}

#hud {
  position: fixed;
  top: 12px;
  left: 12px;
  background: rgba(10, 12, 18, 0.88);
  padding: 10px 14px;
  border-radius: 6px;
  border: 1px solid #2a2e35;
  display: flex;
  flex-direction: column;
  gap: 6px;
  user-select: none;
  z-index: 1;
  max-width: 580px;
}

#hud label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
}

#hud input[type=range] {
  width: 140px;
}

#hud select,
#hud button {
  background: #12151a;
  color: #ddd;
  border: 1px solid #333;
  border-radius: 3px;
  padding: 2px 6px;
  font: inherit;
}

#hud textarea {
  background: #12151a;
  color: #ddd;
  border: 1px solid #333;
  border-radius: 3px;
  padding: 4px;
  font: 11px/1.4 monospace;
  width: 100%;
  resize: vertical;
  min-height: 60px;
  max-height: 240px;
}

#err {
  color: #f88;
  font: 11px/1.4 monospace;
  white-space: pre-wrap;
  max-width: 560px;
}

#hud code {
  color: #7af;
}
</style>
</head>

<body>
  <div id="hud">
    <label id="lbl_preset">preset
      <select id="preset"></select></label>
    <textarea id="term" spellcheck="false"></textarea>
    <label id="lbl_compile"><button id="compile">compile</button>
      <span id="msg">ready.</span></label>
    <div id="err"></div>
    <label id="lbl_s">shrink <code>s</code>
      <input id="s" type="range" min="0.05" max="0.45" step="0.005" value="0.20">
      <span id="sv">0.200</span></label>
    <label id="lbl_radLoop">loop rv radius
      <input id="radLoop" type="range" min="0.001" max="0.5" step="0.001" value="0.20">
      <span id="radLoopv">0.200</span></label>
    <label id="lbl_radFlip1">flip1 rv radius
      <input id="radFlip1" type="range" min="0.001" max="0.5" step="0.001" value="0.20">
      <span id="radFlip1v">0.200</span></label>
    <label id="lbl_radSurf">surf rv radius
      <input id="radSurf" type="range" min="0.001" max="0.5" step="0.001" value="0.20">
      <span id="radSurfv">0.200</span></label>
    <label id="lbl_radFlip2">flip2 rv radius
      <input id="radFlip2" type="range" min="0.001" max="0.5" step="0.001" value="0.30">
      <span id="radFlip2v">0.300</span></label>
    <label id="lbl_pemph">point emphasis
      <input id="pemph" type="range" min="0.1" max="1.0" step="0.01" value="0.35">
      <span id="pemphv">0.35</span></label>
    <label id="lbl_thick">thickness
      <input id="thick" type="range" min="0.002" max="0.08" step="0.001" value="0.015">
      <span id="thickv">0.015</span></label>
    <label id="lbl_wireframe"><input id="wireframe" type="checkbox" checked>
      show hcomp wireframe</label>
    <label id="lbl_renderMode">view
      <select id="renderMode">
        <option value="2d">2D + time</option>
        <option value="3d">3D static</option>
      </select></label>
    <label id="lbl_marchSteps">march steps
      <input id="marchSteps" type="range" min="32" max="1024" step="16" value="128">
      <span id="marchStepsv">128</span></label>
    <label id="lbl_tAxis">time axis
      <select id="tAxis"></select></label>
    <label id="lbl_tSlider">time
      <input id="tSlider" type="range" min="0" max="1" step="0.001" value="0">
      <span id="tSliderv">0.000</span></label>
    <label id="lbl_tPlay"><button id="tPlay">▶</button>speed
      <input id="tSpeed" type="range" min="0.02" max="2" step="0.01" value="0.30">
      <span id="tSpeedv">0.30</span></label>
    <label id="lbl_tBounce"><input id="tBounce" type="checkbox" checked>
      bounce (else loop)</label>
    <label id="lbl_record"><button id="record">record video</button>
      <span>fps</span>
      <input id="recordFps" type="number" min="6" max="120" step="6" value="30" style="width:44px">
      <span id="recordDur"></span>
      <span id="recordMsg"></span></label>
  </div>

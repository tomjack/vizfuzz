<style>
  html, body { margin: 0; height: 100%; background: #0b0d10; color: #ddd;
    font: 13px/1.45 system-ui, -apple-system, sans-serif; overflow: hidden;
    overscroll-behavior: none; }
  canvas { display: block; width: 100vw; height: 100vh; cursor: grab;
    touch-action: none; }
  canvas:active { cursor: grabbing; }
  .panel { position: fixed; background: #1a1d22dd; padding: 10px 12px;
    border-radius: 6px; user-select: none; border: 1px solid #2a2e35; }
  .panel-head { display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; font-weight: 600; font-size: 12px;
    margin: -10px -12px; padding: 8px 12px; }
  .panel-head .toggle { color: #888; font-size: 14px; line-height: 1; }
  .panel-head .toggle::before { content: '▾'; }
  .panel.collapsed .panel-head .toggle::before { content: '▸'; }
  .panel:not(.collapsed) .panel-head { margin-bottom: 8px;
    border-bottom: 1px solid #2a2e35; }
  .panel.collapsed .panel-body { display: none; }
  .panel-body { max-height: calc(100vh - 140px); overflow-y: auto;
    overscroll-behavior: contain; }
  #picker { top: 10px; left: 10px; display: flex; align-items: center; gap: 10px; }
  #picker select { background: #12151a; color: #ddd; border: 1px solid #333;
    border-radius: 3px; padding: 3px 6px; font-size: 12px; }
  #picker .hint { color: #888; font-size: 11px; }
  #hud { top: 54px; left: 10px; max-width: 260px; }
  #hud label { display: block; margin: 4px 0; }
  #hud input[type=range] { width: 180px; vertical-align: middle; }
  #hud select { background: #12151a; color: #ddd; border: 1px solid #333;
    border-radius: 3px; padding: 1px 4px; }
  #legend { bottom: 10px; left: 10px; max-width: 220px; }
  code { color: #cde; }
</style>

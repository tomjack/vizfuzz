    overscroll-behavior: contain; }
  #picker { top: 10px; left: 10px; display: flex; align-items: center; gap: 10px; }

  #hud input[type=range] { width: 180px; vertical-align: middle; }

  #legend { bottom: 10px; left: 10px; max-width: min(90vw, 600px); }
  #legend .panel-body { overflow-x: auto; }
  #legend pre { margin: 0; font-family: ui-monospace, Menlo, Consolas, monospace;

  code { color: #cde; }
